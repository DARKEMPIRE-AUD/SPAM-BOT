<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 KICK ASS SPAM DASHBOARD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }

        header h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        header p {
            color: #aaa;
            font-size: 0.9em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filterpuriyal: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            animation: slideUp 0.6s ease;
        }

        .stat-card h3 {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            animation: slideUp 0.8s ease;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Courier New', monospace;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 15px 30px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-spam {
            background: linear-gradient(135deg, #ff6b6b, #ff8c8c);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-spam:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-spam:active {
            transform: translateY(-1px);
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-clear:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #aaa;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #000;
            border-color: transparent;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-table th {
            background: rgba(255, 255, 255, 0.1);
            color: #ddd;
            font-weight: bold;
        }

        .history-table tr:hover {
            background: rgba(255, 107, 107, 0.1);
        }

        .status-success {
            color: #4caf50;
        }

        .status-error {
            color: #ff6b6b;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #4caf50;
        }

        .alert-error {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
        }

        .user-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-item:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.5);
        }

        .user-item.selected {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
        }

        .user-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .user-id {
            font-size: 0.85em;
            color: #aaa;
            font-family: monospace;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ff6b6b;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .input-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .tabs {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 KICK ASS SPAM</h1>
            <p>Unlimited Discord DM Spam Dashboard</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Messages Sent</h3>
                <div class="number" id="totalSent">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Spam Count</h3>
                <div class="number" id="totalMessages">0</div>
            </div>
            <div class="stat-card">
                <h3>Authorized Users</h3>
                <div class="number" id="authorizedCount">0</div>
            </div>
        </div>

        <div class="main-panel">
            <div id="alert"></div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('spam')">💬 Send Spam</button>
                <button class="tab-btn" onclick="switchTab('history')">📊 History</button>
                <button class="tab-btn" onclick="switchTab('users')">👥 Authorized Users</button>
            </div>

            <!-- Spam Tab -->
            <div id="spam" class="tab-content active">
                <div class="form-group">
                    <label>👤 Target User ID</label>
                    <input type="text" id="userId" placeholder="Enter Discord User ID (e.g., 1234567890)">
                </div>

                <div class="form-group">
                    <label>💬 Message to Spam</label>
                    <textarea id="message" placeholder="Enter the message you want to spam..."></textarea>
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label>🔢 Times to Spam</label>
                        <input type="number" id="times" value="5" min="1" max="1000">
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-spam" onclick="sendSpam()">🚀 SEND SPAM</button>
                    <button class="btn-clear" onclick="clearForm()">🗑️ Clear</button>
                </div>
            </div>

            <!-- History Tab -->
            <div id="history" class="tab-content">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>⏰ Time</th>
                            <th>👤 User ID</th>
                            <th>💬 Message</th>
                            <th>🔢 Count</th>
                            <th>✅ Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #aaa;">No history yet...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Users Tab -->
            <div id="users" class="tab-content">
                <div class="user-list" id="usersList">
                    <div style="text-align: center; color: #aaa; padding: 20px;">
                        Loading authorized users...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'history') loadHistory();
            if (tabName === 'users') loadAuthorizedUsers();
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = message;
            setTimeout(() => alert.innerHTML = '', 5000);
        }

        async function sendSpam() {
            const userId = document.getElementById('userId').value;
            const message = document.getElementById('message').value;
            const times = parseInt(document.getElementById('times').value);

            if (!userId) {
                showAlert('❌ Please enter a User ID', 'error');
                return;
            }

            if (!message) {
                showAlert('❌ Please enter a message', 'error');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>';

            try {
                const response = await fetch(`${API_URL}/spam`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        message: message,
                        times: times
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ Spam sent! ${data.sent}/${data.requested} messages delivered. Total: ${data.total_sent}`, 'success');
                    updateStats();
                    clearForm();
                } else {
                    showAlert(`❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Error: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 SEND SPAM';
            }
        }

        function clearForm() {
            document.getElementById('userId').value = '';
            document.getElementById('message').value = '';
            document.getElementById('times').value = 5;
        }

        async function updateStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                
                document.getElementById('totalSent').textContent = data.total_sent;
                document.getElementById('totalMessages').textContent = data.total_messages;
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch(`${API_URL}/history`);
                const data = await response.json();
                
                const tbody = document.getElementById('historyBody');
                if (data.history.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #aaa;">No history yet...</td></tr>';
                    return;
                }

                tbody.innerHTML = data.history.slice().reverse().map(entry => `
                    <tr>
                        <td>${entry.timestamp}</td>
                        <td><code>${entry.user_id}</code></td>
                        <td>${entry.message.substring(0, 30)}...</td>
                        <td>${entry.count}</td>
                        <td class="status-${entry.status === 'Success' ? 'success' : 'error'}">${entry.status}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        async function loadAuthorizedUsers() {
            try {
                const response = await fetch(`${API_URL}/authorized-users`);
                const data = await response.json();
                
                const usersList = document.getElementById('usersList');
                
                if (data.users.length === 0) {
                    usersList.innerHTML = '<div style="text-align: center; color: #aaa; padding: 20px;">No authorized users yet...</div>';
                    return;
                }

                usersList.innerHTML = data.users.map(user => `
                    <div class="user-item" onclick="fillUserId('${user.user_id}')">
                        <div class="user-name">👤 ${user.username}</div>
                        <div class="user-id">${user.user_id}</div>
                        <div style="font-size: 0.8em; color: #999; margin-top: 5px;">🔐 Authorized: ${user.authorized_at}</div>
                    </div>
                `).join('');

                document.getElementById('authorizedCount').textContent = data.users.length;
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        function fillUserId(userId) {
            document.getElementById('userId').value = userId;
            switchTab('spam');
        }

        // Load stats on page load
        updateStats();
        loadAuthorizedUsers();
    </script>
</body>
</html>
